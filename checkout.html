
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checkout - Kaju Katli Cafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #ddd;
}

.total{
font-size:24px;
font-weight:bold;
margin-top:20px;
text-align:right;
color:#f59e0b;
}

.payment{
margin-top:30px;
text-align:center;
}

.payment img{
width:280px;
border-radius:15px;
margin-top:15px;
}

.notice{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:red;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:14px 25px;
border:none;
background:#111827;
color:white;
cursor:pointer;
border-radius:10px;
margin-top:20px;
}

button:hover{
background:#1f2937;
}

.success{
display:none;
margin-top:20px;
padding:15px;
background:#dcfce7;
color:#166534;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Checkout</h1>

<div id="cartItems"></div>

<div class="total">
Total: Rs. <span id="totalAmount">0</span>
</div>

<div class="payment">

<h2>Scan & Pay</h2>

<img src="2.jpeg" alt="QR Payment">

<div class="notice">
⚠ Pay First Before Placing Order
</div>

</div>

<h2 style="margin-top:30px;">
Customer Details
</h2>

<input type="text" id="customerName"
placeholder="Enter Your Name">

<input type="text" id="customerPhone"
placeholder="Enter Phone Number">

<button onclick="placeOrder()">
Place Order
</button>

<div class="success" id="successMessage">
✅ Order Successfully Placed
</div>

</div>

<script>

let cart=
JSON.parse(localStorage.getItem("cart"))
|| [];

const cartDiv=
document.getElementById("cartItems");

let total=0;

cart.forEach(item=>{

total += item.price;

cartDiv.innerHTML += `

<div class="cart-item">

<span>${item.name}</span>

<span>Rs. ${item.price}</span>

</div>

`;

});

document.getElementById("totalAmount")
.innerHTML=total;

function placeOrder(){

const name=
document.getElementById("customerName").value;

const phone=
document.getElementById("customerPhone").value;

if(!name || !phone){

alert("Fill all details");

return;

}

const order={

customer:name,

phone:phone,

items:cart,

total:total,

date:new Date().toLocaleString()

};

let orders=
JSON.parse(localStorage.getItem("orders"))
|| [];

orders.push(order);

localStorage.setItem(
"orders",
JSON.stringify(orders)
);

localStorage.removeItem("cart");

document.getElementById("successMessage")
.style.display="block";

setTimeout(()=>{

window.location.href=
"orders.html";

},2000);

}


</script>

</body>
</html>
