<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Kaju Katli Cafe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#f59e0b;
}

button{
width:100%;
padding:12px;
background:#f59e0b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-size:16px;
font-weight:bold;
}

button:hover{
background:#d97706;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.link{
text-align:center;
margin-top:15px;
cursor:pointer;
color:#2563eb;
font-weight:bold;
}

.link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Kaju Katli Cafe</h2>

<input
type="email"
id="email"
placeholder="Enter Gmail Address"
required>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

<button onclick="loginUser()">
Login
</button>

<button onclick="signupUser()">
Sign Up
</button>

<p id="message"></p>

<div class="link" onclick="goHome()">
← Back to Home
</div>

</div>

<script>

function signupUser(){

const email=
document.getElementById("email").value.trim();

const password=
document.getElementById("password").value;

const gmailPattern=
/^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if(email==="" || password===""){

alert("Please fill all fields.");

return;

}

if(!gmailPattern.test(email)){

alert("Only Gmail addresses are allowed.");

return;

}

if(password.length<6){

alert("Password must be at least 6 characters.");

return;

}

if(localStorage.getItem(email)){

alert("This Gmail account already exists.");

return;

}

const user={

email,

password

};

localStorage.setItem(
email,
JSON.stringify(user)
);

document.getElementById("message").innerHTML=
"✅ Account Created Successfully! Please Login.";

document.getElementById("email").value="";
document.getElementById("password").value="";

setTimeout(()=>{

window.location.href="login.html";

},2000);

}


// Login Function

function loginUser(){

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value;

const gmailPattern =
/^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if(email==="" || password===""){

alert("Please fill all fields.");

return;

}

if(!gmailPattern.test(email)){

alert("Please enter a valid Gmail address.");

return;

}

const user =
JSON.parse(localStorage.getItem(email));

if(user==null){

alert("No account found. Please Sign Up first.");

return;

}

if(user.password!==password){

alert("Incorrect Password.");

return;

}

localStorage.setItem(
"currentUser",
email
);

document.getElementById("message").innerHTML=
"✅ Login Successful";

setTimeout(()=>{

window.location.href="menu.html";

},1000);

}

// Back to Home

function goHome(){

window.location.href="kaju.html";

}

</script>

</body>

</html>
