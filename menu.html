
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kaju Katli Cafe Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111827;
color:white;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#f59e0b;
}

.cart-box{
background:white;
color:black;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
}

.menu{
padding:40px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.price{
padding:0 10px;
font-weight:bold;
color:#f59e0b;
}

.card button{
margin:10px;
padding:10px;
width:calc(100% - 20px);
border:none;
background:#f59e0b;
color:white;
cursor:pointer;
border-radius:8px;
}

.checkout{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
color:white;
padding:15px 25px;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<script>

if(!localStorage.getItem("currentUser")){
alert("Please Login First");
window.location.href="login.html";
}

</script>

<header>

<div class="logo">
☕ Kaju Katli Cafe
</div>

<div class="cart-box">
🛒 Items:
<span id="cartCount">0</span>
<br>
Total: Rs.
<span id="totalPrice">0</span>
</div>

</header>

<div class="menu" id="menu"></div>

<button class="checkout" onclick="goCheckout()">
Checkout
</button>

<script>

const menuItems=[

{
name:"Milk Tea",
price:50,
img:"https://images.unsplash.com/photo-1571934811356-5cc061b6821f?w=800"
},

{
name:"Black Tea",
price:40,
img:"https://images.unsplash.com/photo-1597318181409-cf64d0b5d8a2?w=800"
},

{
name:"Cappuccino",
price:180,
img:"https://images.unsplash.com/photo-1511920170033-f8396924c348?w=800"
},

{
name:"Latte",
price:200,
img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800"
},

{
name:"Espresso",
price:150,
img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800"
},

{
name:"Cold Coffee",
price:220,
img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=800"
},

{
name:"Burger",
price:250,
img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800"
},

{
name:"Pizza",
price:450,
img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800"
},

{
name:"Momo",
price:180,
img:"https://images.unsplash.com/photo-1626804475297-41608ea09aeb?w=800"
},

{
name:"Chowmein",
price:150,
img:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=800"
},

{
name:"Hot Dog",
price:180,
img:"https://images.unsplash.com/photo-1550317138-10000687a72b?w=800"
},

{
name:"French Fries",
price:120,
img:"https://images.unsplash.com/photo-1576107232684-1279f390859f?w=800"
}

];

let cart=
JSON.parse(localStorage.getItem("cart")) || [];

const menuDiv=
document.getElementById("menu");

menuItems.forEach(item=>{

menuDiv.innerHTML += `

<div class="card">

<img src="${item.img}">

<h3>${item.name}</h3>

<div class="price">
Rs. ${item.price}
</div>

<button onclick="addToCart('${item.name}',${item.price})">
Add To Cart
</button>

</div>

`;

});

function addToCart(name,price){

cart.push({
name,
price
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCart();

alert(name+" Added");

}

function updateCart(){

document.getElementById("cartCount")
.innerHTML=cart.length;

let total=0;

cart.forEach(item=>{
total+=item.price;
});

document.getElementById("totalPrice")
.innerHTML=total;

}

function goCheckout(){

if(cart.length===0){
alert("Cart Empty");
return;
}

window.location.href=
"checkout.html";

}

updateCart();

</script>

</body>
</html>
```
